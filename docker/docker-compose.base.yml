services:
  stun:
    image: instrumentisto/coturn:latest
    command: >
      turnserver --stun-only
      --listening-port=3478
      --listening-ip=0.0.0.0
      --no-tls --no-dtls --fingerprint
    ports:
      - target: 3478
        protocol: udp
      - target: 3478
        protocol: tcp
    profiles: ['emu']

  rtdb-emulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.firebase
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts:ro
      - ./config/firebase:/app/config:ro
      - ../functions:/app/functions:ro
      - ../node_modules:/app/node_modules:ro
      - firebase-emulator-cache:/opt/firebase
      - firebase-emulator-cache-ui:/opt/firebase/.cache
    environment:
      PROJECT_ID: demo-peach-share
      FIREBASE_EMULATOR_DOWNLOAD_PATH: /opt/firebase
      XDG_CACHE_HOME: /opt/firebase/.cache
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sS \"http://localhost:9000/.json?ns=$${PROJECT_ID}-default-rtdb\" >/dev/null && curl -sS http://localhost:9099/ >/dev/null && curl -sS http://localhost:5001/ >/dev/null"
        ]
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 10s
    entrypoint: ['/app/scripts/emulator-entrypoint.sh']
    profiles: ['integration-test', 'emu']

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    working_dir: /src
    volumes:
      - ..:/src:delegated
      - pnpm-store:/var/pnpm-store
      - node_modules:/src/node_modules
    environment:
      MODE: emu
      CHOKIDAR_USEPOLLING: '1'
      WATCHPACK_POLLING: 'true'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:5173/']
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 5s
    entrypoint: ['/src/docker/scripts/web-entrypoint.sh']
    depends_on:
      - rtdb-emulator
      - stun
    profiles: ['emu']

volumes:
  node_modules:
  pnpm-store:
  firebase-emulator-cache:
  firebase-emulator-cache-ui:
