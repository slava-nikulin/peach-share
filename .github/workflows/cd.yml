name: CD

on:
  workflow_dispatch:
    inputs:
      deploy_functions:
        description: 'Deploy Firebase Functions'
        type: boolean
        required: true
        default: false
      deploy_pages:
        description: 'Deploy GitHub Pages'
        type: boolean
        required: true
        default: true

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_test:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.deploy_pages || inputs.deploy_functions)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm test:int
      - run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

  deploy_functions:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_functions }}
    needs: build_test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PEACH_FUNCTION_REGION: ${{ vars.PEACH_FUNCTION_REGION }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - id: auth
        name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: pnpm i --frozen-lockfile
      - run: pnpm i -g firebase-tools

      - run: node -e "console.log('PEACH_FUNCTION_REGION=', process.env.PEACH_FUNCTION_REGION)"

      - name: Deploy functions
        env:
          PEACH_FUNCTION_REGION: ${{ vars.PEACH_FUNCTION_REGION }}
        run: firebase deploy --only functions --project ${{ vars.FIREBASE_PROJECT_ID }}

  deploy_pages:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_pages }}
    needs: build_test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
