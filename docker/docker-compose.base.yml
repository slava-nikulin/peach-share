services:
  rtdb-emulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.firebase
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts:ro
      - ./config/firebase:/app/config:ro
      - ../functions:/app/functions:ro
      - ../node_modules:/app/node_modules:ro
      - firebase-emulator-cache:/opt/firebase
      - firebase-emulator-cache-ui:/opt/firebase/.cache
    environment:
      FIREBASE_EMULATOR_DOWNLOAD_PATH: /opt/firebase
      XDG_CACHE_HOME: /opt/firebase/.cache
    healthcheck:
      test: ["CMD-SHELL", "sh /app/scripts/emulator-ready.sh"]
      interval: 2s
      timeout: 2s
      retries: 90
      start_period: 5s
    entrypoint: ['/app/scripts/emulator-entrypoint.sh']
    profiles: ['integration-test', 'emu', 'e2e']

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    working_dir: /src
    volumes:
      - ..:/src:delegated
      - web-node-modules:/src/node_modules
      - pnpm-store:/var/pnpm-store
    environment:
      MODE: emu
      CHOKIDAR_USEPOLLING: '1'
      WATCHPACK_POLLING: 'true'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:5173/']
      interval: 5s
      timeout: 2s
      retries: 20
      start_period: 5s
    entrypoint: ['/src/docker/scripts/web-entrypoint.sh']
    depends_on:
      - rtdb-emulator
    profiles: ['emu', 'e2e']

volumes:
  web-node-modules:
  pnpm-store:
  firebase-emulator-cache:
  firebase-emulator-cache-ui:
